<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicTracker</title>
    <link rel="stylesheet" href="style.css">

    <!--Fontes do Google-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!--Inter Fonte Google-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">


    <body>
    <header id="barra_de_baixo">
        <div class="posicao_da_barra"> 
            <div class="btn_home">
                <button >
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE --><path fill="currentColor" d="M6 19h3v-6h6v6h3v-9l-6-4.5L6 10zm-2 2V9l8-6l8 6v12h-7v-6h-2v6zm8-8.75"/></svg>
                </button>
                <p>home</p>
            </div>

            <div class="btn_explore">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE --><path fill="currentColor" d="m7.5 16.5l7-2l2-7l-7 2zm4.5-3q-.625 0-1.062-.437T10.5 12t.438-1.062T12 10.5t1.063.438T13.5 12t-.437 1.063T12 13.5m0 8.5q-2.075 0-3.9-.788t-3.175-2.137T2.788 15.9T2 12t.788-3.9t2.137-3.175T8.1 2.788T12 2t3.9.788t3.175 2.137T21.213 8.1T22 12t-.788 3.9t-2.137 3.175t-3.175 2.138T12 22m0-2q3.325 0 5.663-2.337T20 12t-2.337-5.663T12 4T6.337 6.338T4 12t2.338 5.663T12 20m0-8"/></svg>
                </button>
                <p>explore</p>
            </div>

            <div class="btn_profile">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE --><path fill="currentColor" d="M12 12q-1.65 0-2.825-1.175T8 8t1.175-2.825T12 4t2.825 1.175T16 8t-1.175 2.825T12 12m-8 8v-2.8q0-.85.438-1.562T5.6 14.55q1.55-.775 3.15-1.162T12 13t3.25.388t3.15 1.162q.725.375 1.163 1.088T20 17.2V20zm2-2h12v-.8q0-.275-.137-.5t-.363-.35q-1.35-.675-2.725-1.012T12 15t-2.775.338T6.5 16.35q-.225.125-.363.35T6 17.2zm6-8q.825 0 1.413-.587T14 8t-.587-1.412T12 6t-1.412.588T10 8t.588 1.413T12 10m0 8"/></svg>
                </button>
                <p>profile</p>
            </div>
            
        </div>
    </header>

    <header id="barra_de_cima">
        <h1 id="logo">Comic <span class="trk_color">Track</span></h1>
        <span class="icons_diversos">
            <div class="busca"> 
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
                        <path fill="currentColor" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/>
                    </svg>                      
                </button>
            </div>
            <div class="sino">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 1024 1024"><!-- Icon from Ant Design Icons by HeskeyBaozi - https://github.com/ant-design/ant-design-icons/blob/master/LICENSE --><path fill="currentColor" d="M816 768h-24V428c0-141.1-104.3-257.7-240-277.1V112c0-22.1-17.9-40-40-40s-40 17.9-40 40v38.9c-135.7 19.4-240 136-240 277.1v340h-24c-17.7 0-32 14.3-32 32v32c0 4.4 3.6 8 8 8h216c0 61.8 50.2 112 112 112s112-50.2 112-112h216c4.4 0 8-3.6 8-8v-32c0-17.7-14.3-32-32-32M512 888c-26.5 0-48-21.5-48-48h96c0 26.5-21.5 48-48 48M304 768V428c0-55.6 21.6-107.8 60.9-147.1S456.4 220 512 220s107.8 21.6 147.1 60.9S720 372.4 720 428v340z"/></svg>
                </button>
            </div>
            <div class="perfil">
                <button>
                    <img src="Assets/Imagens Icones/Icone-Novo-Layout.svg" alt="imagem própria que ainda devo criar">
                </button>
            </div>
        </span>
    </header>

    <main>
        <div id="list-lendo">
            <div class="titulo-vermais">
                <h2 >Continuar Lendo</h2>
                <h2 class="ver-mais">Ver Mais</h2>
            </div>

            <div class="hqs-lendo">
                <span class="homemaranha">
                    <img src="Assets/Hqs Covers/Ultimate SpiderMan 2025.png" alt="Cover_HomeAranhaUltimate" srcset="">
                    <h3>Ultimate Homem Aranha (2025)</h3>
                    <div class="prog-hq">
                        <div id="barra-progresso">
                            <div class="progresso-feito" style="width: 50%;"></div>
                        </div>
                        <p>50%</p>
                    </div>
                </span>
                <span class="Spawn"> 
                    <img src="Assets/Hqs Covers/Spawn Origens.png" alt="">
                    <h3>Spawn Origens</h3>
                    <div class="prog-hq">
                        <div id="barra-progresso">
                            <div class="progresso-feito" style="width: 23%;"></div>
                        </div>
                        <p>23%</p>
                    </div>
                </span>
                <span class="Hellblazer">  
                    <img src="Assets/Hqs Covers/HellBalzer.png" alt="">
                    <h3>Hellblazer</h3>
                    <div class="prog-hq">
                        <div id="barra-progresso">
                            <div class="progresso-feito" style="width: 12%;"></div>
                        </div>
                        <p>12%</p>
                    </div>
                </span>
            </div>
        </div>

        <div id="list-populares">
            <div class="titulo-vermais">
                <h2 class="em-alta-semana">Em alta esta semana</h2>
                <h2 class="ver-mais">Ver Mais</h2>
            </div>
            <div class="flex-hq-popular">
                <span class="popular1">
                    <img src="Assets/Hqs Covers/Ultimate SpiderMan 2025.png" alt="" srcset="">
                    <h3>Ultimate Homem Aranha 2025</h3>
                    <div class="posicao-na-semana">
                        <h3>1</h3>
                    </div>
                </span>
                <span class="popular2">
                    <img src="Assets/Hqs Covers/Invencible hq.jpg" alt="" srcset="">
                    <h3>Invencível</h3>
                    <div class="posicao-na-semana">
                        <h3>2</h3>
                    </div>
                </span>
                <span class="popular3">
                    <img src="Assets/Hqs Covers/Watchmen HQ.jpg" alt="" srcset="">
                    <h3>Watchmen</h3>
                    <div class="posicao-na-semana">
                        <h3>3</h3>
                    </div>
                </span>
            </div>
        </div>



    </main>

   


    <script src="Javinha.js"></script>  
</body>
</html>
