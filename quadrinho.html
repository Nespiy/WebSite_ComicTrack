<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComicTracker - Quadrinho</title>
    <link rel="stylesheet" href="Estilos CSS/global-style.css" />
    <link rel="stylesheet" href="Estilos CSS/Estilo-pag-HQ.css" />

    <!--Fontes do Google-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <header id="barra_de_cima">
      <div class="ic-voltar-e-titulo">
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
          >
            <!-- Icon from Material Symbols by Google - https://github.com/google/material-design-icons/blob/master/LICENSE -->
            <path
              fill="currentColor"
              d="m7.825 13l5.6 5.6L12 20l-8-8l8-8l1.425 1.4l-5.6 5.6H20v2z"
            />
          </svg>
        </button>
        <div id="titulo_wrapper">
          <span id="titulo_quadrinho">Quadrinho</span>
        </div>
      </div>

      <span class="icons_diversos">
        <div class="busca">
          <button>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
            >
              <path
                fill="currentColor"
                d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"
              />
            </svg>
          </button>
        </div>
        <div class="sino">
          <button>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 1024 1024"
            >
              <!-- Icon from Ant Design Icons by HeskeyBaozi - https://github.com/ant-design/ant-design-icons/blob/master/LICENSE -->
              <path
                fill="currentColor"
                d="M816 768h-24V428c0-141.1-104.3-257.7-240-277.1V112c0-22.1-17.9-40-40-40s-40 17.9-40 40v38.9c-135.7 19.4-240 136-240 277.1v340h-24c-17.7 0-32 14.3-32 32v32c0 4.4 3.6 8 8 8h216c0 61.8 50.2 112 112 112s112-50.2 112-112h216c4.4 0 8-3.6 8-8v-32c0-17.7-14.3-32-32-32M512 888c-26.5 0-48-21.5-48-48h96c0 26.5-21.5 48-48 48M304 768V428c0-55.6 21.6-107.8 60.9-147.1S456.4 220 512 220s107.8 21.6 147.1 60.9S720 372.4 720 428v340z"
              />
            </svg>
          </button>
        </div>
        <div class="perfil">
          <button>
            <img
              src="Assets/Imagens Icones/Icone-Novo-Layout.svg"
              alt="imagem própria que ainda devo criar"
            />
          </button>
        </div>
      </span>
    </header>

    <main>
      <div id="FramePrincipal">
        <div class="img-pcp">
          <img
            src="Assets/Hqs Covers/Invencible hq.jpg"
            alt="Imagem do Quadrinho"
          />
        </div>

        <div class="infos-tudo">
          <div class="div_info_n_hq">
            <h1>Invencível</h1>
          </div>

          <div class="div_info_notas">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
            >
              <!-- Icon from Material Symbols Light by Google - https://github.com/google/material-design-icons/blob/master/LICENSE -->
              <path
                fill="currentColor"
                d="m8.125 7.092l2.608-3.47q.238-.322.566-.472T12 3t.701.15t.566.471l2.608 3.471l4.02 1.368q.534.18.822.605q.289.426.289.94q0 .237-.07.471t-.228.449l-2.635 3.573l.1 3.83q.025.706-.466 1.189T16.564 20l-.454-.056L12 18.733l-4.11 1.211q-.124.05-.24.053q-.117.003-.214.003q-.665 0-1.15-.483t-.459-1.188l.1-3.856l-2.629-3.548q-.159-.217-.229-.453Q3 10.236 3 10q0-.506.297-.942q.296-.435.828-.618z"
              />
            </svg>
            <h2><span id="nota-media">0.0</span>/10</h2>
          </div>

          <div class="div_info_dtb_n">
            <div class="distrib_texto">
              <p>Distribuição de notas:</p>
            </div>
            <div class="grafico-das-barras">...</div>
          </div>
        </div>
      </div>
    </main>

    <script src="Javinha.js"></script>
  </body>
</html>
